
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#070a13" />
  
  <!-- Gear Teeth -->
  <g fill="url(#logo-grad)">
    <rect x="236" y="80" width="40" height="60" rx="10" transform="rotate(0 256 256)" />
    <rect x="236" y="80" width="40" height="60" rx="10" transform="rotate(45 256 256)" />
    <rect x="236" y="80" width="40" height="60" rx="10" transform="rotate(90 256 256)" />
    <rect x="236" y="80" width="40" height="60" rx="10" transform="rotate(135 256 256)" />
    <rect x="236" y="80" width="40" height="60" rx="10" transform="rotate(180 256 256)" />
    <rect x="236" y="80" width="40" height="60" rx="10" transform="rotate(225 256 256)" />
    <rect x="236" y="80" width="40" height="60" rx="10" transform="rotate(270 256 256)" />
    <rect x="236" y="80" width="40" height="60" rx="10" transform="rotate(315 256 256)" />
  </g>
  
  <!-- Gear Outer Ring Body -->
  <circle cx="256" cy="256" r="140" fill="#070a13" stroke="url(#logo-grad)" stroke-width="20" />
  
  <!-- Inner Circle Cutout Background -->
  <circle cx="256" cy="256" r="90" fill="#070a13" />
  
  <!-- Checkmark -->
  <path d="M 180 260 L 235 315 L 340 195" 
        stroke="url(#logo-grad)" 
        stroke-width="24" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />
</svg>
